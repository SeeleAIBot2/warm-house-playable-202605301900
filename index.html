function pos(ev){let r=stage.getBoundingClientRect(),sc=stageScale();return{x:(ev.clientX-r.left)/sc,y:(ev.clientY-r.top)/sc}}

function setDragBox(el,x,y,s){el.style.setProperty('position','absolute','important');el.style.setProperty('left',x+'px','important');el.style.setProperty('top',y+'px','important');el.style.setProperty('right','auto','important');el.style.setProperty('bottom','auto','important');el.style.setProperty('width',s.w+'px','important');el.style.setProperty('height',s.h+'px','important');el.style.setProperty('inset','auto','important');el.style.setProperty('z-index','140','important');el.style.setProperty('opacity','1','important');el.style.setProperty('transform','none','important');el.style.setProperty('overflow','visible','important');el.querySelectorAll('.assetIcon').forEach(img=>{img.style.setProperty('width','100%','important');img.style.setProperty('height','100%','important');img.style.setProperty('max-width','100%','important');img.style.setProperty('max-height','100%','important');img.style.setProperty('object-fit','contain','important')})}
function startDrag(ev){swallow(ev);let el=ev.currentTarget,p=pos(ev),cr=el.getBoundingClientRect(),sr=stage.getBoundingClientRect(),sc=stageScale(),s=dragSize(el.dataset.type),left=(cr.left-sr.left)/sc,top=(cr.top-sr.top)/sc;drag={el,from:+el.dataset.cell,dx:p.x-left,dy:p.y-top};el.classList.add('dragging');stage.appendChild(el);setDragBox(el,left,top,s);moveDrag(ev);el.setPointerCapture?.(ev.pointerId);log('DRAG_START_'+el.dataset.type)}
function dragSize(type){let mobile=innerWidth<700||isMobileLandscape();if(!mobile)return{w:145,h:65};if(type==='paintBucket'||type==='roller')return{w:58,h:38};if(type==='loveseat')return{w:92,h:50};return{w:70,h:44}}
function moveDrag(ev){if(!drag)return;swallow(ev);let p=pos(ev),s=dragSize(drag.el.dataset.type);setDragBox(drag.el,p.x-drag.dx,p.y-drag.dy,s)}
function nextType(t){return{chair:'armchair',armchair:'loveseat',brush1:'brush2',brush2:'brush3',brush3:'paintBucket',paintBucket:'roller'}[t]||''}
function endDrag(ev){if(!drag)return;swallow(ev);let p=pos(ev),target=cells.findIndex(c=>{let r=c.getBoundingClientRect(),sr=stage.getBoundingClientRect(),sc=stageScale(),x=(r.left-sr.left)/sc,y=(r.top-sr.top)/sc;return p.x>=x&&p.x<=x+r.width/sc&&p.y>=y&&p.y<=y+r.height/sc});let from=drag.from,el=drag.el,type=el.dataset.type,allowed=mode==='sofa'?['chair','armchair']:['brush1','brush2','brush3','paintBucket'];if(target>=0&&target!==from&&items[target]&&items[target].dataset.type===type&&allowed.includes(type)){resetDragStyle(el);items[target].remove();delete items[target];delete items[from];let next=nextType(type);addItem(target,next);items[target].classList.add('mergeFlash');show(mergeText(next));log('MERGE_SUCCESS_'+next);el.remove();if(mode==='sofa'){if(next==='loveseat')setTimeout(repairSofa,680);else guideSecondSofaMerge()}else{mergeStep++;if(next==='roller'||mergeStep>=4)setTimeout(repairPaint,720);else guideNextBrush(next)}}else{resetDragStyle(el);cells[from]?.appendChild(el);items[from]=el;show('拖到相同物品上合成');log('DRAG_BACK')}drag=null}
stage.addEventListener('pointermove',moveDrag);stage.addEventListener('pointerup',endDrag);stage.addEventListener('pointercancel',endDrag);function markGuided(idx){Object.values(items).forEach(el=>el.classList.remove('guided'));idx.forEach(i=>items[i]&&items[i].classList.add('guided'))}
function guideSecondSofaMerge(){let armIdx=Object.keys(items).filter(i=>items[i].dataset.type==='armchair').map(Number);if(armIdx.length<2&&!items[6]){addItem(6,'armchair');items[6].classList.add('mergeFlash');show('获得第二个单人沙发！')}armIdx=Object.keys(items).filter(i=>items[i].dataset.type==='armchair').map(Number);let guided=armIdx.slice(0,2);markGuided(guided[0]!=null?[guided[0]]:[]);setGoal(['chair','armchair','loveseat'],1,2);targetHint.textContent=shortHint('furniture')||'拖动两个单人沙发合成绿沙发';showMergeGuide(guided[0]??6,{xBias:.22,yBias:.82,to:guided[1],toXBias:.34,toYBias:.76});hintLine.style.left='606px';hintLine.style.top='230px'}
function guideNextBrush(type){let chain=['brush1','brush2','brush3','paintBucket'],idx=Math.min(chain.indexOf(type),2),hints={'brush2':'中刷子 → 大刷子','brush3':'大刷子 → 油漆桶','paintBucket':'完成最终工具'};setGoal(chain,idx,Math.min(idx+1,3));setTimeout(()=>{let slot=[2,10,6][mergeStep-1]||2;if(!items[slot]){addItem(slot,type);items[slot].classList.add('mergeFlash');show('获得第二个材料！')}let pair=Object.keys(items).filter(i=>items[i].dataset.type===type).map(Number).slice(0,2);markGuided(pair[0]!=null?[pair[0]]:[]);targetHint.textContent=shortHint('tool')||('继续合成：'+(hints[type]||'完成工具'));showMergeGuide(pair[0],{xBias:.22,yBias:.82,to:pair[1],toXBias:.34,toYBias:.76});hintLine.style.left='466px';hintLine.style.top='436px'},260)}
function mergeText(t){return{armchair:'合成橙色单人椅！',loveseat:'合成绿沙发！',brush2:'合成中刷子！',brush3:'合成大刷子！',paintBucket:'合成油漆桶！',roller:'最终工具完成！'}[t]||'合成成功！'}function show(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),950)}
function clearMergeState(){if(drag?.el)drag.el.remove();stage.querySelectorAll(':scope > .item.dragging,:scope > .item').forEach(el=>el.remove());grid.innerHTML='';cells=[];items={};drag=null}
function repairSofa(){merge.style.display='none';hintLine.style.display='none';hand.className='hand';hand.classList.remove('mergeGuide');hand.style.display='none';musicBtn.style.display='grid';document.getElementById('cta').style.display='none';clearMergeState();sofa.classList.add('fixed');girl.classList.add('happy');show('新沙发修好了！');log('ROOM_REPAIR_SOFA');setTimeout(nextChoice,1200)}
function nextChoice(){girl.classList.remove('happy');choices.innerHTML='<div class="bubble" data-choice="window" data-label="修窗户"><i class="icon windowIcon"></i></div><div class="bubble hint" data-choice="paint" data-label="刷墙变暖"><img class="assetIcon" src="https://seeleaibot2.github.io/warm-house-playable-202605301900/assets/brush_small.png" /></div>';choices.style.display='flex';choiceText.textContent='继续修哪里？';choiceText.style.display='block';hand.classList.remove('mergeGuide');hand.style.display='block';hand.style.zIndex='60';hand.style.left='922px';hand.style.top='210px';choices.onclick=e=>{swallow(e);let b=e.target.closest('.bubble');if(!b)return;log('SECOND_CHOICE_'+b.dataset.choice);if(b.dataset.choice==='paint'){openBrushMerge()}else{win.classList.add('fixed');girl.classList.add('happy');show('需要更多材料');setTimeout(()=>showEnd('立即游玩','下载解锁更多房间'),1000)}}}
function repairPaint(){merge.style.display='none';hintLine.style.display='none';hand.className='hand';hand.classList.remove('mergeGuide');hand.style.display='none';musicBtn.style.display='grid';clearMergeState();room.classList.add('painted');win.classList.add('fixed');girl.classList.add('happy');show('整间屋子变暖了！');document.getElementById('cta').textContent='继续装修';document.getElementById('cta').style.display='grid';log('ROOM_REPAIR_PAINT');setTimeout(()=>showEnd('继续装修','立即游玩 · 解锁更多房间'),1450)}
function showEnd(title,sub){document.getElementById('cta').style.display='none';endcard.querySelector('h1').textContent=title;endcard.querySelector('p').textContent=sub;endcard.style.display='flex'}setTimeout(()=>log('DISPLAYED'),500);
</script></body></html>
