#merge{position:absolute;inset:0;z-index:50;background:radial-gradient(circle at 50% 40%,rgba(47,96,142,.62),rgba(4,10,18,.82));display:none;align-items:center;justify-content:center}.panel{position:relative;width:1010px;height:700px;padding:26px 34px;background:linear-gradient(#83d9ef,#d5fbff);border:10px solid #fff;border-radius:54px;box-shadow:0 30px 55px rgba(0,0,0,.48),inset 0 -14px 0 rgba(68,139,178,.14)}.goal{position:absolute;left:38px;right:38px;top:30px;height:120px;background:linear-gradient(#fff,#effbff);border-radius:34px;display:flex;align-items:center;justify-content:center;gap:20px;color:#1687b0;font-size:48px;font-weight:1000;box-shadow:inset 0 -10px 0 rgba(50,155,200,.12),0 11px 0 rgba(0,0,0,.14),0 0 18px rgba(255,255,255,.7)}.goal .mini{transform:scale(.92);margin:0}.goalMark{position:relative;width:118px;height:104px;border-radius:28px;display:grid;place-items:center}.goalMark.yellow{box-shadow:0 0 0 7px #ffe75a,0 0 28px 12px rgba(255,231,90,.72)}.goalMark.green{box-shadow:0 0 0 7px #2bd866,0 0 28px 12px rgba(43,216,102,.65)}.goal .arrow{font-size:58px;line-height:1;color:#1687b0;text-shadow:0 3px 0 #fff;font-weight:1000;margin:0 10px}.goal .chainLine{display:none}.targetHint{position:absolute;left:50%;top:172px;transform:translateX(-50%);z-index:8;width:auto;min-width:520px;height:54px;padding:9px 24px;border-radius:18px;background:linear-gradient(#fff18f 0,#ffbd37 100%);border:4px solid #fff;color:#673000;font-size:27px;line-height:1;font-weight:1000;box-shadow:0 7px 0 rgba(0,0,0,.16),0 0 20px rgba(255,230,80,.75);text-align:center}.targetHint:after{display:none}.arrow{font-size:44px;color:#1c91bd;text-shadow:0 2px #fff;font-weight:1000}.grid{position:absolute;left:50%;top:260px;transform:translateX(-50%);display:grid;grid-template-columns:repeat(4,155px);grid-template-rows:repeat(4,75px);gap:10px}.cell{position:relative;background:linear-gradient(#eafdff,#bee7f6);border:5px solid #fff;border-radius:22px;box-shadow:inset 0 4px 0 rgba(255,255,25 <body><div class="game"><div class="stage" id="stage"><div class="room" id="room"><div class="wall"></div><div class="floor"></div><div class="crack c1"></div><div class="crack c2"></div><div class="hole h1"></div><div class="hole h2"></div><div class="photo"></div><div class="ice i1"></div><div class="ice i2"></div><div class="ice i3"></div><div class="curtain"><span class="l"></span><span class="r"></span></div><div class="window" id="window"><i class="break"></i></div><div class="fireplace"><div class="fire"></div></div><div class="boxes"><i class="box" style="--r:-8deg"></i><i class="box" style="--r:7deg"></i></div><div class="debris"></div><div class="snowpile"></div><div class="brokenChair"></div><div class="breath"></div><div class="breath b2"></div><div class="sofa" id="sofa"><div class="back"></div><div class="seat"></div><div class="pillow p1"></div><div class="pillow p2"></div></div><div class="charShadow"></div><img id="girl" class="character3d" src="character_3d_woman_cut.png" alt="3D female character shivering" /></div><div class="logo">暖屋港口<small>MERGE RESCUE</small></div><div class="choices" id="choices"><div class="bubble" data-choice="tool" data-label="刷子"><img class="assetIcon" src="assets/brush_small.png" /></div><div class="bubble hint" data-choice="sofa" data-label="沙发"><b class="recommend">推荐</b><img class="assetIcon" src="assets/sofa_green.png" /></div></div><div class="choiceText" id="choiceText">点击来选择</div><div class="hand" id="hand"></div><div class="hintLine" id="hintLine"></div><button class="musicBtn" id="musicBtn">♪</button><button class="cta" id="cta">立即游玩</button><div class="toast" id="toast">合成成功！</div><div id="merge"><div class="panel"><div class="goal"><span class="goalMark yellow"><img class="assetIcon" src="assets/chair_blue.png" /></span><span class="arrow">➜</span><span class="goalMark green"><img class="assetIcon" src="assets/armchair_orange.png" /></span><span class="arrow">➜</span><img class="assetIcon" src="assets/sofa_green.png" /></div><div class="targetHint" id="targetHint">拖动两把椅子，合成单人沙发</div><div class="grid" id="grid"></div></div></div><div class="endcard" id="endcard"><h1>房间变暖了！</h1><p>继续合成，修好整间小屋</p><button class="cta big">立即游玩</button></div></div></div>
<script>
const stage=document.getElementById('stage'),room=document.getElementById('room'),choices=document.getElementById('choices'),choiceText=document.getElementById('choiceText'),hand=document.getElementById('hand'),hintLine=document.getElementById('hintLine'),targetHint=document.getElementById('targetHint'),merge=document.getElementById('merge'),grid=document.getElementById('grid'),toast=document.getElementById('toast'),sofa=document.getElementById('sofa'),girl=document.getElementById('girl'),win=document.getElementById('window'),endcard=document.getElementById('endcard'),goal=document.querySelector('.goal');let drag=null,cells=[],items={},mode='sofa',mergeStep=0;
function scale(){stage.style.setProperty('--scale',Math.min(innerWidth/1280,innerHeight/720))}addEventListener('resize',scale);scale();
for(let i=0;i<70;i++){let s=document.createElement('b');s.className='snowflake';s.textContent=Math.random()>.35?'✦':'•';s.style.left=Math.random()*1280+'px';s.style.top=-Math.random()*720+'px';s.style.fontSize=10+Math.random()*27+'px';s.style.animationDuration=4.6+Math.random()*7+'s';s.style.animationDelay=-Math.random()*8+'s';stage.appendChild(s)}
function log(e){console.log('[playable_v2]',e)}
let audioCtx=null,bgmOn=true,bgmTimer=null,bgmStep=0;const musicBtn=document.getElementById('musicBtn');
function initBgm(){if(audioCtx)return;audioCtx=new (window.AudioContext||window.webkitAudioContext)();startBgm();log('BGM_START')}
function tone(freq,dur=0.28,vol=0.035,type='sine'){if(!audioCtx||!bgmOn)return;let t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(vol,t+0.03);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+dur+.03)}
function playBgmBeat(){if(!audioCtx||!bgmOn)return;const melody=[392,440,523,440,349,392,440,392],bass=[196,196,220,220,174,174,196,196];let i=bgmStep++%melody.length;tone(melody[i],.32,.028,'triangle');if(i%2===0)tone(bass[i],.55,.018,'sine')}
function startBgm(){clearInterval(bgmTimer);if(!bgmOn)return;playBgmBeat();bgmTimer=setInterval(playBgmBeat,420)}
function stopBgm(){clearInterval(bgmTimer);bgmTimer=null}
document.addEventListener('pointerdown',()=>{initBgm();audioCtx&&audioCtx.resume&&audioCtx.resume()},{once:true});
musicBtn.onclick=e=>{e.stopPropagation();if(!audioCtx)initBgm();bgmOn=!bgmOn;musicBtn.classList.toggle('off',!bgmOn);musicBtn.textContent=bgmOn?'♪':'×';bgmOn?startBgm():stopBgm();log('BGM_'+(bgmOn?'ON':'OFF'))};function iconClass(t){return{chair:'chair',armchair:'armchair',loveseat:'loveseat',paint:'paintIcon',window:'windowIcon',tool:'toolIcon',saw:'sawIcon',cloth:'clothIcon',brush1:'paintIcon',brush2:'paintIcon',brush3:'paintIcon',paintBucket:'paintIcon',roller:'paintIcon'}[t]||'chair'}function assetImg(t){return{chair:'assets/chair_blue.png',armchair:'assets/armchair_orange.png',loveseat:'assets/sofa_green.png',brush1:'assets/brush_small.png',brush2:'assets/brush_medium.png',brush3:'assets/brush_large.png',paintBucket:'assets/paint_final.png',roller:'assets/paint_final.png'}[t]||''}
function itemHtml(t){return assetImg(t)?'<img class="assetIcon" src="'+assetImg(t)+'" />':'<i class="icon '+iconClass(t)+'"></i>'}
function setGoal(arr,current=0,next=1){goal.innerHTML=arr.map((t,i)=>'<span class="'+(i===current?'goalMark yellow':i===next?'goalMark green':'')+'">'+itemHtml(t)+'</span>').join('<span class="arrow">➜</span>')}
document.getElementById('cta').onclick=()=>{log('CTA_CLICKED');showEnd('下载解锁更多房间','继续装修更多房间')};endcard.onclick=()=>log('CTA_CLICKED_ENDCARD');
choices.onclick=firstChoice;function firstChoice(e){let b=e.target.closest('.bubble');if(!b)return;log('FIRST_CHOICE_'+b.dataset.choice);if(b.dataset.choice==='tool'||b.dataset.choice==='paint'){openBrushMerge()}else{openSofaMerge()}}
function openSofaMerge(){mode='sofa';mergeStep=0;choices.style.display='none';choiceText.style.display='none';hand.style.display='none';document.getElementById('cta').style.display='none';merge.style.display='flex';setGoal(['chair','armchair','loveseat'],0,1);buildSofaGrid();setTimeout(()=>{hand.style.display='block';hand.className='hand drag';hintLine.style.display='block'},250)}
function openBrushMerge(){mode='brush';mergeStep=0;choices.style.display='none';choiceText.style.display='none';hand.style.display='none';document.getElementById('cta').style.display='none';merge.style.display='flex';setGoal(['brush1','brush2','brush3','paintBucket'],0,1);buildBrushGrid('brush1','小刷子 → 中刷子');setTimeout(()=>{hand.style.display='block';hand.className='hand brushDrag';hintLine.style.display='block';hand.style.left='535px';hand.style.top='590px'},220)}
function buildSofaGrid(){grid.innerHTML='';cells=[];items={};let layout=['','','','','chair','','armchair','','','chair','','','','','','chair'];for(let i=0;i<16;i++){let c=document.createElement('div');c.className='cell';c.dataset.i=i;c.innerHTML='<i class="emptyShine"></i>';grid.appendChild(c);cells.push(c);if(layout[i])addItem(i,layout[i])}markGuided([9,4]);targetHint.textContent='拖动蓝椅升级成橙椅，再合成绿沙发'}
function buildBrushGrid(type,hint){grid.innerHTML='';cells=[];items={};let layout=['','','','','','','','','',type,'','','',type,'','',''];for(let i=0;i<16;i++){let c=document.createElement('div');c.className='cell';c.dataset.i=i;c.innerHTML='<i class="emptyShine"></i>';grid.appendChild(c);cells.push(c);if(layout[i])addItem(i,layout[i])}markGuided([9,13]);targetHint.textContent='拖动两个相同工具合成：'+hint;hintLine.style.left='466px';hintLine.style.top='436px'}
function addItem(i,type){let el=document.createElement('div');el.className='item';el.dataset.type=type;el.dataset.cell=i;el.innerHTML=itemHtml(type);cells[i].appendChild(el);items[i]=el;el.addEventListener('pointerdown',startDrag)}
function pos(ev){let r=stage.getBoundingClientRect(),sc=parseFloat(getComputedStyle(stage).getPropertyValue('--scale'))||1;return{x:(ev.clientX-r.left)/sc,y:(ev.clientY-r.top)/sc}}function startDrag(ev){ev.preventDefault();let el=ev.currentTarget,p=pos(ev),cr=el.getBoundingClientRect(),sr=stage.getBoundingClientRect(),sc=parseFloat(getComputedStyle(stage).getPropertyValue('--scale'))||1;drag={el,from:+el.dataset.cell,dx:p.x-(cr.left-sr.left)/sc,dy:p.y-(cr.top-sr.top)/sc};el.classList.add('dragging');stage.appendChild(el);moveDrag(ev);stage.setPointerCapture?.(ev.pointerId);log('DRAG_START_'+el.dataset.type)}
function moveDrag(ev){if(!drag)return;let p=pos(ev);Object.assign(drag.el.style,{left:p.x-drag.dx+'px',top:p.y-drag.dy+'px',width:'108px',height:'86px'})}
function nextType(t){return{chair:'armchair',armchair:'loveseat',brush1:'brush2',brush2:'brush3',brush3:'paintBucket',paintBucket:'roller'}[t]||''}
function endDrag(ev){if(!drag)return;let p=pos(ev),target=cells.findIndex(c=>{let r=c.getBoundingClientRect(),sr=stage.getBoundingClientRect(),sc=parseFloat(getComputedStyle(stage).getPropertyValue('--scale'))||1,x=(r.left-sr.left)/sc,y=(r.top-sr.top)/sc;return p.x>=x&&p.x<=x+r.width/sc&&p.y>=y&&p.y<=y+r.height/sc});let from=drag.from,el=drag.el,type=el.dataset.type,allowed=mode==='sofa'?['chair','armchair']:['brush1','brush2','brush3','paintBucket'];el.classList.remove('dragging');el.style.cssText='';if(target>=0&&target!==from&&items[target]&&items[target].dataset.type===type&&allowed.includes(type)){items[target].remove();delete items[target];delete items[from];let next=nextType(type);addItem(target,next);items[target].classList.add('mergeFlash');show(mergeText(next));log('MERGE_SUCCESS_'+next);el.remove();if(mode==='sofa'){if(next==='loveseat')setTimeout(repairSofa,680);else guideSecondSofaMerge()}else{mergeStep++;if(next==='roller'||mergeStep>=4)setTimeout(repairPaint,720);else guideNextBrush(next)}}else{cells[from].appendChild(el);items[from]=el;show('拖到相同物品上合成');log('DRAG_BACK')}drag=null}
stage.addEventListener('pointermove',moveDrag);stage.addEventListener('pointerup',endDrag);stage.addEventListener('pointercancel',endDrag);function markGuided(idx){Object.values(items).forEach(el=>el.classList.remove('guided'));idx.forEach(i=>items[i]&&items[i].classList.add('guided'))}
function guideSecondSofaMerge(){let armIdx=Object.keys(items).filter(i=>items[i].dataset.type==='armchair').map(Number);if(armIdx.length<2&&!items[6]){addItem(6,'armchair');items[6].classList.add('mergeFlash');show('获得第二个单人沙发！')}armIdx=Object.keys(items).filter(i=>items[i].dataset.type==='armchair').map(Number);markGuided(armIdx.slice(0,2));setGoal(['chair','armchair','loveseat'],1,2);targetHint.textContent='拖动两个单人沙发合成绿沙发';hand.style.left='750px';hand.style.top='324px';hintLine.style.left='606px';hintLine.style.top='230px'}
function guideNextBrush(type){let chain=['brush1','brush2','brush3','paintBucket'],idx=Math.min(chain.indexOf(type),2),hints={'brush2':'中刷子 → 大刷子','brush3':'大刷子 → 油漆桶','paintBucket':'继续完成最终工具'};setGoal(chain,idx,Math.min(idx+1,3));setTimeout(()=>{let slot=[2,10,6][mergeStep-1]||2;if(!items[slot]){addItem(slot,type);items[slot].classList.add('mergeFlash');show('获得第二个材料！')}let pair=Object.keys(items).filter(i=>items[i].dataset.type===type).map(Number).slice(0,2);markGuided(pair);targetHint.textContent='继续合成：'+(hints[type]||'完成工具');hand.style.left='535px';hand.style.top='590px';hintLine.style.left='466px';hintLine.style.top='436px'},260)}
function mergeText(t){return{armchair:'合成橙色单人椅！',loveseat:'合成绿沙发！',brush2:'合成中刷子！',brush3:'合成大刷子！',paintBucket:'合成油漆桶！',roller:'最终工具完成！'}[t]||'合成成功！'}function show(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),950)}
function repairSofa(){merge.style.display='none';hintLine.style.display='none';hand.className='hand';hand.style.display='none';document.getElementById('cta').style.display='none';sofa.classList.add('fixed');girl.classList.add('happy');show('新沙发修好了！');log('ROOM_REPAIR_SOFA');setTimeout(nextChoice,1200)}
function nextChoice(){girl.classList.remove('happy');choices.innerHTML='<div class="bubble" data-choice="window" data-label="修窗户"><i class="icon windowIcon"></i></div><div class="bubble hint" data-choice="paint" data-label="刷墙变暖"><img class="assetIcon" src="assets/brush_small.png" /></div>';choices.style.display='flex';choiceText.textContent='继续修哪里？';choiceText.style.display='block';hand.style.display='block';hand.style.zIndex='60';hand.style.left='922px';hand.style.top='210px';choices.onclick=e=>{let b=e.target.closest('.bubble');if(!b)return;log('SECOND_CHOICE_'+b.dataset.choice);if(b.dataset.choice==='paint'){openBrushMerge()}else{win.classList.add('fixed');girl.classList.add('happy');show('需要更多材料');setTimeout(()=>showEnd('立即游玩','下载解锁更多房间'),1000)}}}
function repairPaint(){merge.style.display='none';hintLine.style.display='none';hand.className='hand';hand.style.display='none';room.classList.add('painted');win.classList.add('fixed');girl.classList.add('happy');show('整间屋子变暖了！');document.getElementById('cta').textContent='继续装修';document.getElementById('cta').style.display='grid';log('ROOM_REPAIR_PAINT');setTimeout(()=>showEnd('继续装修','立即游玩 · 解锁更多房间'),1450)}
function showEnd(title,sub){endcard.querySelector('h1').textContent=title;endcard.querySelector('p').textContent=sub;endcard.style.display='flex'}setTimeout(()=>log('DISPLAYED'),500);
</script></body></html>
